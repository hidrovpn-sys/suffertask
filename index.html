<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SufferTask - Gazanç Et</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">

    <!-- Header -->
    <nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-50 p-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-amber-500 tracking-wider">SUFFER<span class="text-white">TASK</span></h1>
            <div class="flex items-center gap-3">
                <button id="langBtn" onclick="toggleLanguage()" class="text-xs bg-slate-800 border border-slate-700 px-3 py-1.5 rounded-full hover:bg-slate-700 transition">🌐 TK / TR</button>
                <button id="btnLogout" onclick="logout()" class="hidden text-xs bg-red-500/20 text-red-400 border border-red-500/30 px-3 py-1.5 rounded-full hover:bg-red-500/30 transition">Çykış</button>
            </div>
        </div>
    </nav>

    <!-- AUTH CONTAINER (Giriş / Kayıt) -->
    <div id="authSection" class="max-w-md mx-auto p-4 mt-6 space-y-6">
        <div class="bg-slate-800/80 border border-slate-700 rounded-3xl p-6 space-y-5 shadow-2xl">
            <div class="text-center space-y-1">
                <h2 id="authTitle" class="text-2xl font-black text-amber-500">Ulgama Gir</h2>
                <p id="authSub" class="text-xs text-slate-400">Pulyñyzy gazanmak üçin giriñ ýa-da hasap açyñ</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-xs text-slate-400 font-semibold mb-1 block">Telefon Nomeri</label>
                    <div class="flex items-center bg-slate-900 border border-slate-700 rounded-xl overflow-hidden">
                        <span class="bg-slate-800 text-amber-500 font-bold px-3 py-3 text-sm border-r border-slate-700">+993</span>
                        <input type="tel" id="authPhone" placeholder="6XXXXXXX" maxlength="8" class="bg-transparent w-full p-3 text-sm focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="text-xs text-slate-400 font-semibold mb-1 block">Açar Sözi (Şifre)</label>
                    <input type="password" id="authPassword" placeholder="******" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:outline-none focus:border-amber-500">
                </div>

                <button id="btnAuthSubmit" onclick="handleAuth()" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold py-3.5 rounded-xl transition active:scale-95 shadow-lg">
                    Ulgama Gir
                </button>

                <div class="text-center pt-2">
                    <button onclick="toggleAuthMode()" id="btnToggleAuth" class="text-xs text-amber-500 hover:underline">
                        Täze hasap açmak üçin basyñ
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD (Giriş yapıldığında görünecek) -->
    <main id="dashboardSection" class="hidden max-w-md mx-auto p-4 pb-24 space-y-6">

        <!-- Balance Card -->
        <div class="bg-gradient-to-br from-amber-500 to-amber-700 rounded-3xl p-6 text-slate-950 shadow-xl relative overflow-hidden">
            <div class="absolute -right-4 -bottom-4 opacity-10 text-8xl font-black">TMT</div>
            <p id="lblBalanceTitle" class="text-xs font-bold uppercase tracking-widest text-amber-950/80">Jemi Bakiýañyz</p>
            <div class="flex items-baseline space-x-2 mt-1">
                <span id="userBalance" class="text-4xl font-extrabold">0.00</span>
                <span class="text-lg font-bold">TMT</span>
            </div>
            <div class="mt-4 pt-4 border-t border-amber-600/40 flex justify-between text-xs font-semibold text-amber-950">
                <span>Her reklama = Kazanç (50%)</span>
                <span>Min. Çekim: 50 TMT</span>
            </div>
        </div>

        <!-- Ad Watch Section -->
        <div class="bg-slate-800/60 border border-slate-700/60 rounded-2xl p-5 space-y-4">
            <h2 id="lblWatchTitle" class="text-lg font-bold flex items-center gap-2">
                <i class="fa-solid fa-play-circle text-amber-500"></i> Reklama Seret we Kazan
            </h2>
            <p id="lblWatchDesc" class="text-xs text-slate-400">Her bir görlen reklama üçin bakiýañyza TMT goşular.</p>
            
            <button onclick="watchAd()" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold py-3.5 px-4 rounded-xl shadow-lg transition active:scale-95 flex items-center justify-center gap-2">
                <i class="fa-solid fa-bolt"></i> <span id="btnWatch">Reklama Gör (+0.20 TMT)</span>
            </button>
        </div>

        <!-- Withdrawal Section -->
        <div class="bg-slate-800/60 border border-slate-700/60 rounded-2xl p-5 space-y-4">
            <h2 id="lblWithdrawTitle" class="text-lg font-bold flex items-center gap-2">
                <i class="fa-solid fa-wallet text-amber-500"></i> Pul Çekmek
            </h2>
            
            <div class="space-y-3">
                <label class="text-xs text-slate-400 block">Çekim Yönti</label>
                <select id="withdrawMethod" onchange="onMethodChange()" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:outline-none focus:border-amber-500">
                    <option value="PUBG_UC">PUBG UC</option>
                    <option value="USDT">Crypto USDT</option>
                    <option value="TMT">TMT (Nakit / Kart)</option>
                </select>

                <!-- Dynamic UC Package Select -->
                <div id="ucPackageGroup" class="space-y-1">
                    <label class="text-xs text-slate-400 block">UC Paketi Seçin</label>
                    <select id="ucPackage" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:outline-none focus:border-amber-500">
                        <option value="60 UC - 20 TMT">60 UC (20 TMT)</option>
                        <option value="325 UC - 100 TMT">325 UC (100 TMT)</option>
                        <option value="660 UC - 200 TMT">660 UC (200 TMT)</option>
                        <option value="1800 UC - 500 TMT">1800 UC (500 TMT)</option>
                        <option value="3850 UC - 1000 TMT">3850 UC (1000 TMT)</option>
                        <option value="8100 UC - 2000 TMT">8100 UC (2000 TMT)</option>
                    </select>
                </div>

                <!-- Dynamic Amount Input (USDT & TMT) -->
                <div id="customAmountGroup" class="hidden space-y-1">
                    <label id="lblAmountUnit" class="text-xs text-slate-400 block">Möçberi (USDT)</label>
                    <input type="number" id="withdrawAmount" placeholder="Möçber giriziñ" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:outline-none focus:border-amber-500">
                </div>

                <div class="space-y-1">
                    <label id="lblAccountDetail" class="text-xs text-slate-400 block">PUBG Player ID</label>
                    <input type="text" id="accountDetails" placeholder="Player ID giriziñ" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:outline-none focus:border-amber-500">
                </div>

                <button onclick="requestWithdrawal()" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3.5 rounded-xl transition active:scale-95">
                    <span id="btnWithdraw">Sargyt Et</span>
                </button>
            </div>
        </div>

    </main>

    <script>
        const SUPABASE_URL = "https://tjflipjmzatfteeonnye.supabase.co";
        const SUPABASE_KEY = "sb_publishable_sgtCtf-FogjhA0fghAE4fA_W8ATUyHr";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let isSignUpMode = false;
        let currentLang = 'TK';

        // Sayfa Yüklendiğinde Oturum Kontrolü
        window.onload = () => {
            const savedUser = localStorage.getItem('suffer_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showDashboard();
            }
        };

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('authTitle').innerText = isSignUpMode ? 'Hasap Aç' : 'Ulgama Gir';
            document.getElementById('btnAuthSubmit').innerText = isSignUpMode ? 'Kayıt Bol' : 'Ulgama Gir';
            document.getElementById('btnToggleAuth').innerText = isSignUpMode ? 'Öňden hasabyñyz barmy? Giris ediñ' : 'Täze hasap açmak üçin basyñ';
        }

        function handleAuth() {
            const phone = document.getElementById('authPhone').value.trim();
            const pass = document.getElementById('authPassword').value.trim();

            if (phone.length < 7 || !pass) {
                alert('Dogry nomer we açar sözüni giriziñ!');
                return;
            }

            const fullPhone = "+993" + phone;
            currentUser = { phone: fullPhone, balance: 0.00 };

            // Yerel depolamaya kaydet (Beni Hatırla)
            localStorage.setItem('suffer_user', JSON.stringify(currentUser));
            showDashboard();
        }

        function showDashboard() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('btnLogout').classList.remove('hidden');
            document.getElementById('userBalance').innerText = currentUser.balance.toFixed(2);
        }

        function logout() {
            localStorage.removeItem('suffer_user');
            currentUser = null;
            location.reload();
        }

        function onMethodChange() {
            const method = document.getElementById('withdrawMethod').value;
            const ucGroup = document.getElementById('ucPackageGroup');
            const customGroup = document.getElementById('customAmountGroup');
            const lblUnit = document.getElementById('lblAmountUnit');
            const lblDetail = document.getElementById('lblAccountDetail');
            const detailInput = document.getElementById('accountDetails');

            if (method === 'PUBG_UC') {
                ucGroup.classList.remove('hidden');
                customGroup.classList.add('hidden');
                lblDetail.innerText = 'PUBG Player ID';
                detailInput.placeholder = 'PUBG Player ID giriziñ';
            } else if (method === 'USDT') {
                ucGroup.classList.add('hidden');
                customGroup.classList.remove('hidden');
                lblUnit.innerText = 'Möçberi (USDT)';
                lblDetail.innerText = 'USDT Wallet Adresi (BEP20/TRC20)';
                detailInput.placeholder = 'Cüzdan adresini yapıştırın';
            } else {
                ucGroup.classList.add('hidden');
                customGroup.classList.remove('hidden');
                lblUnit.innerText = 'Möçberi (TMT)';
                lblDetail.innerText = 'Kart / Hesap Nomeri';
                detailInput.placeholder = 'Kart nomeri veya alıcı hesabı';
            }
        }

        function watchAd() {
            // Reklam İzleme Mantığı - İzlendikten sonra bakiyeye 50% pay eklenir
            currentUser.balance += 0.20; // Örnek reklam başı pay
            document.getElementById('userBalance').innerText = currentUser.balance.toFixed(2);
            localStorage.setItem('suffer_user', JSON.stringify(currentUser));
            alert('Reklama seredildi! Bakiýañyza 0.20 TMT goşuldy.');
        }

        function requestWithdrawal() {
            const method = document.getElementById('withdrawMethod').value;
            const detail = document.getElementById('accountDetails').value.trim();

            if (!detail) {
                alert('Haýyş, maglumatlary doly giriziñ!');
                return;
            }

            alert('Sargydyñyz kabul edildi! Pulyñyz / UC-ñyz 24 sagadyñ dowamynda ugradylar.');
        }

        function toggleLanguage() {
            currentLang = currentLang === 'TK' ? 'TR' : 'TK';
            alert('Dil çalşyldy: ' + currentLang);
        }
    </script>
</body>
</html>
